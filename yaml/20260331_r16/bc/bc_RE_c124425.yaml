definition: "A representative measurement of the number of times the volume of gas in the lung at the start of the washout (the Functional Residual Capacity) must be recycled to eliminate the tracer to the pre-defined endpoint. Practically, this is the point where the end tidal concentration of inert gas is less than 1/40th of the opening concentration."
